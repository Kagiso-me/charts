# CI test values — uses existingSecret so no real credentials are required
# at render/lint time. The chart-testing install step runs against kind,
# which is stateless (authentik won't actually start without a real DB/Redis).

existingSecret:
  secretName: authentik-ci-secret

authentik:
  postgresql:
    host: postgresql.databases.svc.cluster.local
    name: authentik
    user: authentik
  redis:
    host: redis-master.databases.svc.cluster.local

server:
  replicaCount: 1
  metrics:
    serviceMonitor:
      enabled: false
  podDisruptionBudget:
    enabled: true
    minAvailable: 1

worker:
  replicaCount: 1
  podDisruptionBudget:
    enabled: true
    maxUnavailable: 1

global:
  env:
    - name: AUTHENTIK_BOOTSTRAP_EMAIL
      value: admin@example.com
