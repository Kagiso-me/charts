apiVersion: v2
name: authentik
description: >
  authentik is an open-source Identity Provider focused on flexibility and
  versatility. It supports OAuth2, SAML, LDAP, RADIUS, and SCIM, and can act
  as an SSO provider, a reverse-proxy forward-auth provider, or a full IdP.
type: application
version: 0.1.0
appVersion: "2026.2.1"
home: https://goauthentik.io
icon: https://raw.githubusercontent.com/goauthentik/authentik/main/web/icons/icon.png
keywords:
  - authentik
  - identity-provider
  - sso
  - oauth2
  - saml
  - ldap
  - oidc
sources:
  - https://github.com/goauthentik/authentik
maintainers:
  - name: Phil
    email: phil@kagiso.me
annotations:
