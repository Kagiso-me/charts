{{- $wrk := .Values.worker -}}
{{- $secretName := include "authentik.secretName" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ printf "%s-worker" (include "authentik.fullname" .) }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "authentik.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ $wrk.replicaCount }}
  revisionHistoryLimit: {{ $wrk.revisionHistoryLimit }}
  selector:
    matchLabels:
      {{- include "authentik.worker.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with $wrk.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "authentik.worker.selectorLabels" . | nindent 8 }}
        {{- with $wrk.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- include "authentik.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "authentik.serviceAccountName" . }}
      automountServiceAccountToken: false
      {{- with $wrk.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $wrk.terminationGracePeriodSeconds }}
      terminationGracePeriodSeconds: {{ . }}
      {{- end }}
      {{- with $wrk.priorityClassName }}
      priorityClassName: {{ . | quote }}
      {{- end }}
      {{- with $wrk.schedulerName }}
      schedulerName: {{ . | quote }}
      {{- end }}
      {{- with $wrk.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $wrk.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $wrk.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or $wrk.affinity $wrk.podAffinityPreset $wrk.podAntiAffinityPreset (and $wrk.nodeAffinityPreset.type $wrk.nodeAffinityPreset.key) }}
      affinity:
        {{- if $wrk.affinity }}
        {{- toYaml $wrk.affinity | nindent 8 }}
        {{- else }}
        {{- include "authentik.affinityPreset" (dict "preset" $wrk.podAffinityPreset "type" "affinity" "component" "worker" "context" $) | nindent 8 }}
        {{- include "authentik.affinityPreset" (dict "preset" $wrk.podAntiAffinityPreset "type" "anti" "component" "worker" "context" $) | nindent 8 }}
        {{- include "authentik.nodeAffinityPreset" (dict "preset" $wrk.nodeAffinityPreset "context" $) | nindent 8 }}
        {{- end }}
      {{- end }}
      containers:
        - name: worker
          image: {{ include "authentik.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if $wrk.command }}
          command:
            {{- toYaml $wrk.command | nindent 12 }}
          {{- end }}
          args:
            {{- if $wrk.args }}
            {{- toYaml $wrk.args | nindent 12 }}
            {{- else }}
            - worker
            {{- end }}
          {{- with $wrk.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: 9000
              protocol: TCP
            - name: metrics
              containerPort: 9300
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ $secretName }}
            {{- with .Values.global.envFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.global.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $wrk.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $wrk.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $wrk.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $wrk.lifecycleHooks }}
          lifecycle:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: media
              mountPath: /media
            - name: blueprints
              mountPath: /blueprints/custom
            {{- with $wrk.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        - name: media
          emptyDir: {}
        # Empty blueprint dir — operators can swap for a ConfigMap/Secret volume
        - name: blueprints
          emptyDir: {}
        {{- with $wrk.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
