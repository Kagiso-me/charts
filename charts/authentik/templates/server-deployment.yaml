{{- $srv := .Values.server -}}
{{- $secretName := include "authentik.secretName" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ printf "%s-server" (include "authentik.fullname" .) }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "authentik.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  replicas: {{ $srv.replicaCount }}
  revisionHistoryLimit: {{ $srv.revisionHistoryLimit }}
  minReadySeconds: {{ $srv.minReadySeconds }}
  selector:
    matchLabels:
      {{- include "authentik.server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with $srv.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "authentik.server.selectorLabels" . | nindent 8 }}
        {{- with $srv.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- include "authentik.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "authentik.serviceAccountName" . }}
      automountServiceAccountToken: false
      {{- with $srv.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $srv.terminationGracePeriodSeconds }}
      terminationGracePeriodSeconds: {{ . }}
      {{- end }}
      {{- with $srv.priorityClassName }}
      priorityClassName: {{ . | quote }}
      {{- end }}
      {{- with $srv.schedulerName }}
      schedulerName: {{ . | quote }}
      {{- end }}
      {{- with $srv.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $srv.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $srv.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or $srv.affinity $srv.podAffinityPreset $srv.podAntiAffinityPreset (and $srv.nodeAffinityPreset.type $srv.nodeAffinityPreset.key) }}
      affinity:
        {{- if $srv.affinity }}
        {{- toYaml $srv.affinity | nindent 8 }}
        {{- else }}
        {{- include "authentik.affinityPreset" (dict "preset" $srv.podAffinityPreset "type" "affinity" "component" "server" "context" $) | nindent 8 }}
        {{- include "authentik.affinityPreset" (dict "preset" $srv.podAntiAffinityPreset "type" "anti" "component" "server" "context" $) | nindent 8 }}
        {{- include "authentik.nodeAffinityPreset" (dict "preset" $srv.nodeAffinityPreset "context" $) | nindent 8 }}
        {{- end }}
      {{- end }}
      containers:
        - name: server
          image: {{ include "authentik.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if $srv.command }}
          command:
            {{- toYaml $srv.command | nindent 12 }}
          {{- end }}
          args:
            {{- if $srv.args }}
            {{- toYaml $srv.args | nindent 12 }}
            {{- else }}
            - server
            {{- end }}
          {{- with $srv.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: 9000
              protocol: TCP
            - name: https
              containerPort: 9443
              protocol: TCP
            - name: metrics
              containerPort: 9300
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ $secretName }}
            {{- with .Values.global.envFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.global.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $srv.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $srv.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $srv.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $srv.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $srv.lifecycleHooks }}
          lifecycle:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            # authentik writes temporary files and media under /media and /tmp
            - name: tmp
              mountPath: /tmp
            - name: media
              mountPath: /media
            {{- with $srv.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        - name: media
          emptyDir: {}
        {{- with $srv.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
