{{- if not .Values.existingSecret.secretName }}
{{/*
  Chart-managed Secret: converts .Values.authentik nested config into
  AUTHENTIK_SECTION__KEY environment variables following the authentik
  environment-variable naming convention documented at
  https://docs.goauthentik.io/docs/installation/configuration
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-config" (include "authentik.fullname" .) }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "authentik.labels" . | nindent 4 }}
type: Opaque
stringData:
  ## Core
  AUTHENTIK_SECRET_KEY: {{ .Values.authentik.secret_key | quote }}
  AUTHENTIK_LOG_LEVEL: {{ .Values.authentik.log_level | quote }}
  AUTHENTIK_ERROR_REPORTING__ENABLED: {{ .Values.authentik.error_reporting.enabled | toString | quote }}

  ## PostgreSQL
  AUTHENTIK_POSTGRESQL__HOST: {{ .Values.authentik.postgresql.host | quote }}
  AUTHENTIK_POSTGRESQL__PORT: {{ .Values.authentik.postgresql.port | toString | quote }}
  AUTHENTIK_POSTGRESQL__NAME: {{ .Values.authentik.postgresql.name | quote }}
  AUTHENTIK_POSTGRESQL__USER: {{ .Values.authentik.postgresql.user | quote }}
  AUTHENTIK_POSTGRESQL__PASSWORD: {{ .Values.authentik.postgresql.password | quote }}

  ## Redis
  AUTHENTIK_REDIS__HOST: {{ .Values.authentik.redis.host | quote }}
  AUTHENTIK_REDIS__PORT: {{ .Values.authentik.redis.port | toString | quote }}
  AUTHENTIK_REDIS__PASSWORD: {{ .Values.authentik.redis.password | quote }}

  ## Email
  {{- with .Values.authentik.email }}
  {{- if .host }}
  AUTHENTIK_EMAIL__HOST: {{ .host | quote }}
  AUTHENTIK_EMAIL__PORT: {{ .port | toString | quote }}
  AUTHENTIK_EMAIL__USE_TLS: {{ .use_tls | toString | quote }}
  AUTHENTIK_EMAIL__USE_SSL: {{ .use_ssl | toString | quote }}
  AUTHENTIK_EMAIL__USERNAME: {{ .username | quote }}
  AUTHENTIK_EMAIL__PASSWORD: {{ .password | quote }}
  AUTHENTIK_EMAIL__FROM: {{ .from | quote }}
  AUTHENTIK_EMAIL__TIMEOUT: {{ .timeout | toString | quote }}
  {{- end }}
  {{- end }}
{{- end }}
