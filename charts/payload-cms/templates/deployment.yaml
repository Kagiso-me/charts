apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "payload-cms.fullname" . }}
  namespace: {{ include "payload-cms.namespace" . }}
  labels:
    {{- include "payload-cms.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "payload-cms.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "payload-cms.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "payload-cms.serviceAccountName" . }}
      securityContext:
        fsGroup: 1001
        runAsUser: 1001
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.37
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          command:
            - sh
            - -c
            - |
              until nc -z {{ .Values.database.postgresHost }} {{ .Values.database.postgresPort }}; do
                echo "Waiting for PostgreSQL..."; sleep 2;
              done
      containers:
        - name: payload-cms
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            - name: PAYLOAD_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ if .Values.auth.existingSecret }}{{ .Values.auth.existingSecret }}{{ else }}{{ include "payload-cms.fullname" . }}{{ end }}
                  key: payload-secret
            - name: DATABASE_URI
              valueFrom:
                secretKeyRef:
                  name: {{ if .Values.auth.existingSecret }}{{ .Values.auth.existingSecret }}{{ else }}{{ include "payload-cms.fullname" . }}{{ end }}
                  key: database-uri
            - name: PAYLOAD_PUBLIC_SERVER_URL
              value: {{ .Values.serverUrl | quote }}
            - name: PORT
              value: {{ .Values.service.port | quote }}
            - name: NODE_ENV
              value: "production"
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.media.persistence.enabled }}
          volumeMounts:
            - name: media
              mountPath: {{ .Values.media.mountPath }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- if .Values.media.persistence.enabled }}
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: {{ include "payload-cms.fullname" . }}-media
      {{- end }}
