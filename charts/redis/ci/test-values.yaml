# Values used by `ct install` in CI.
# Known password for determinism, minimal resources, no persistence.

auth:
  enabled: true
  password: "testpassword"

master:
  replicaCount: 1

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

  persistence:
    enabled: false

  startupProbe:
    enabled: true
    initialDelaySeconds: 5
    failureThreshold: 15

  # Smoke-test disableCommands
  disableCommands:
    - FLUSHDB
    - FLUSHALL

metrics:
  enabled: true
  serviceMonitor:
    enabled: false  # No Prometheus Operator in kind CI cluster

# sysctl.enabled: false in CI — kind nodes don't allow privileged init containers
sysctl:
  enabled: false
