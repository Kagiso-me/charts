{{- if .Values.master.configuration }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "redis.master.fullname" . }}-config
  namespace: {{ include "redis.namespace" . }}
  labels:
    {{- include "redis.labels" . | nindent 4 }}
    app.kubernetes.io/component: master
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  redis.conf: |
    {{- .Values.master.configuration | nindent 4 }}
{{- end }}
