apiVersion: v1
kind: Service
metadata:
  name: {{ include "redis.master.svc.headless" . }}
  namespace: {{ include "redis.namespace" . }}
  labels:
    {{- include "redis.labels" . | nindent 4 }}
    app.kubernetes.io/component: master
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: redis
      port: {{ .Values.master.service.port }}
      targetPort: redis
      protocol: TCP
  selector:
    {{- include "redis.master.selectorLabels" . | nindent 4 }}
