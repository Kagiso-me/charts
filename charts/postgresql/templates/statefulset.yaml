{{- $initdbCM := "" }}
{{- if .Values.primary.initdb.scriptsConfigMap }}
{{- $initdbCM = .Values.primary.initdb.scriptsConfigMap }}
{{- else if .Values.primary.initdb.scripts }}
{{- $initdbCM = printf "%s-initdb" (include "postgresql.primary.fullname" .) }}
{{- end }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "postgresql.primary.fullname" . }}
  namespace: {{ include "postgresql.namespace" . }}
  labels:
    {{- include "postgresql.labels" . | nindent 4 }}
    app.kubernetes.io/component: primary
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.primary.replicaCount }}
  serviceName: {{ include "postgresql.primary.svc.headless" . }}
  revisionHistoryLimit: {{ .Values.primary.revisionHistoryLimit }}
  minReadySeconds: {{ .Values.primary.minReadySeconds }}
  selector:
    matchLabels:
      {{- include "postgresql.primary.selectorLabels" . | nindent 6 }}
  updateStrategy:
    type: RollingUpdate
  {{- if .Values.primary.persistentVolumeClaimRetentionPolicy.enabled }}
  persistentVolumeClaimRetentionPolicy:
    whenScaled: {{ .Values.primary.persistentVolumeClaimRetentionPolicy.whenScaled }}
    whenDeleted: {{ .Values.primary.persistentVolumeClaimRetentionPolicy.whenDeleted }}
  {{- end }}
  template:
    metadata:
      labels:
        {{- include "postgresql.primary.selectorLabels" . | nindent 8 }}
        {{- with .Values.primary.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/initdb: {{ include (print $.Template.BasePath "/initdb-scripts-configmap.yaml") . | sha256sum }}
        {{- with .Values.primary.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- include "postgresql.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "postgresql.serviceAccountName" . }}
      terminationGracePeriodSeconds: {{ .Values.primary.terminationGracePeriodSeconds }}
      {{- if .Values.primary.podSecurityContext.enabled }}
      securityContext:
        fsGroup: {{ .Values.primary.podSecurityContext.fsGroup }}
        runAsUser: {{ .Values.primary.podSecurityContext.runAsUser }}
        {{- with .Values.primary.podSecurityContext.seccompProfile }}
        seccompProfile:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      {{- end }}
      {{- if .Values.primary.affinity }}
      affinity:
        {{- toYaml .Values.primary.affinity | nindent 8 }}
      {{- else if or .Values.primary.podAffinityPreset .Values.primary.podAntiAffinityPreset .Values.primary.nodeAffinityPreset.type }}
      affinity:
        {{- with .Values.primary.podAffinityPreset }}
        podAffinity:
          {{- include "postgresql.affinityPreset" (dict "preset" . "context" $) | nindent 10 }}
        {{- end }}
        {{- with .Values.primary.podAntiAffinityPreset }}
        podAntiAffinity:
          {{- include "postgresql.affinityPreset" (dict "preset" . "context" $) | nindent 10 }}
        {{- end }}
        {{- if .Values.primary.nodeAffinityPreset.type }}
        nodeAffinity:
          {{- if eq .Values.primary.nodeAffinityPreset.type "soft" }}
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: {{ .Values.primary.nodeAffinityPreset.key }}
                    operator: In
                    values:
                      {{- toYaml .Values.primary.nodeAffinityPreset.values | nindent 22 }}
          {{- else if eq .Values.primary.nodeAffinityPreset.type "hard" }}
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: {{ .Values.primary.nodeAffinityPreset.key }}
                    operator: In
                    values:
                      {{- toYaml .Values.primary.nodeAffinityPreset.values | nindent 22 }}
          {{- end }}
        {{- end }}
      {{- end }}
      {{- with .Values.primary.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.primary.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.primary.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with .Values.primary.schedulerName }}
      schedulerName: {{ . }}
      {{- end }}
      {{- if or .Values.volumePermissions.enabled .Values.primary.initContainers }}
      initContainers:
        {{- if and .Values.volumePermissions.enabled .Values.primary.persistence.enabled }}
        - name: volume-permissions
          image: {{ .Values.volumePermissions.image.registry }}/{{ .Values.volumePermissions.image.repository }}:{{ .Values.volumePermissions.image.tag }}
          imagePullPolicy: {{ .Values.volumePermissions.image.pullPolicy }}
          securityContext:
            runAsUser: 0
          command:
            - /bin/sh
            - -c
            - chown -R {{ .Values.primary.podSecurityContext.runAsUser }}:{{ .Values.primary.podSecurityContext.fsGroup }} /var/lib/postgresql/data
          {{- with .Values.volumePermissions.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
        {{- end }}
        {{- with .Values.primary.initContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      containers:
        - name: postgresql
          image: {{ include "postgresql.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.primary.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.primary.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.primary.containerSecurityContext.enabled }}
          securityContext:
            runAsNonRoot: {{ .Values.primary.containerSecurityContext.runAsNonRoot }}
            allowPrivilegeEscalation: {{ .Values.primary.containerSecurityContext.allowPrivilegeEscalation }}
            readOnlyRootFilesystem: {{ .Values.primary.containerSecurityContext.readOnlyRootFilesystem }}
            {{- with .Values.primary.containerSecurityContext.capabilities }}
            capabilities:
              {{- toYaml . | nindent 14 }}
            {{- end }}
            {{- with .Values.primary.containerSecurityContext.seccompProfile }}
            seccompProfile:
              {{- toYaml . | nindent 14 }}
            {{- end }}
          {{- end }}
          env:
            {{- if not .Values.auth.usePasswordFiles }}
            {{- if .Values.auth.enablePostgresUser }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "postgresql.secretName" . }}
                  key: {{ .Values.auth.secretKeys.adminPasswordKey }}
            {{- end }}
            {{- if .Values.auth.username }}
            - name: POSTGRES_USER
              value: {{ .Values.auth.username | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "postgresql.secretName" . }}
                  key: {{ .Values.auth.secretKeys.userPasswordKey }}
            {{- end }}
            {{- else }}
            {{- if .Values.auth.enablePostgresUser }}
            - name: POSTGRES_PASSWORD_FILE
              value: /opt/postgresql/secrets/{{ .Values.auth.secretKeys.adminPasswordKey }}
            {{- end }}
            {{- if .Values.auth.username }}
            - name: POSTGRES_USER
              value: {{ .Values.auth.username | quote }}
            - name: POSTGRES_PASSWORD_FILE
              value: /opt/postgresql/secrets/{{ .Values.auth.secretKeys.userPasswordKey }}
            {{- end }}
            {{- end }}
            {{- if .Values.auth.database }}
            - name: POSTGRES_DB
              value: {{ .Values.auth.database | quote }}
            {{- end }}
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            {{- if or .Values.primary.configuration .Values.primary.pgHbaConfiguration }}
            - name: POSTGRES_INITDB_ARGS
              value: ""
            {{- end }}
            {{- with .Values.primary.extraEnvVars }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: postgresql
              containerPort: 5432
              protocol: TCP
          {{- if .Values.primary.livenessProbe.enabled }}
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - exec pg_isready -U {{ .Values.auth.username | default "postgres" | quote }} -h 127.0.0.1 -p 5432
            initialDelaySeconds: {{ .Values.primary.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.primary.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.primary.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.primary.livenessProbe.failureThreshold }}
            successThreshold: {{ .Values.primary.livenessProbe.successThreshold }}
          {{- end }}
          {{- if .Values.primary.readinessProbe.enabled }}
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - exec pg_isready -U {{ .Values.auth.username | default "postgres" | quote }} -h 127.0.0.1 -p 5432
            initialDelaySeconds: {{ .Values.primary.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.primary.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.primary.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.primary.readinessProbe.failureThreshold }}
            successThreshold: {{ .Values.primary.readinessProbe.successThreshold }}
          {{- end }}
          {{- if .Values.primary.startupProbe.enabled }}
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - exec pg_isready -U {{ .Values.auth.username | default "postgres" | quote }} -h 127.0.0.1 -p 5432
            initialDelaySeconds: {{ .Values.primary.startupProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.primary.startupProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.primary.startupProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.primary.startupProbe.failureThreshold }}
            successThreshold: {{ .Values.primary.startupProbe.successThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.primary.resources | nindent 12 }}
          {{- with .Values.primary.lifecycleHooks }}
          lifecycle:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: run
              mountPath: /var/run/postgresql
            {{- if or .Values.primary.configuration .Values.primary.pgHbaConfiguration }}
            - name: config
              mountPath: /etc/postgresql
            {{- end }}
            - name: tmp
              mountPath: /tmp
            {{- if $initdbCM }}
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
            {{- end }}
            {{- if .Values.auth.usePasswordFiles }}
            - name: postgresql-passwords
              mountPath: /opt/postgresql/secrets
              readOnly: true
            {{- end }}
            {{- with .Values.primary.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
        {{- with .Values.primary.sidecars }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if .Values.metrics.enabled }}
        - name: metrics
          image: {{ include "postgresql.metrics.image" . }}
          imagePullPolicy: {{ .Values.metrics.image.pullPolicy }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: DATA_SOURCE_URI
              value: "127.0.0.1:5432/postgres?sslmode=disable"
            - name: DATA_SOURCE_USER
              value: {{ .Values.auth.username | default "postgres" | quote }}
            {{- if .Values.auth.usePasswordFiles }}
            - name: DATA_SOURCE_PASS_FILE
              value: /opt/postgresql/secrets/{{ if .Values.auth.username }}{{ .Values.auth.secretKeys.userPasswordKey }}{{ else }}{{ .Values.auth.secretKeys.adminPasswordKey }}{{ end }}
            {{- else }}
            - name: DATA_SOURCE_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ include "postgresql.secretName" . }}
                  key: {{ if .Values.auth.username }}{{ .Values.auth.secretKeys.userPasswordKey }}{{ else }}{{ .Values.auth.secretKeys.adminPasswordKey }}{{ end }}
            {{- end }}
            - name: PG_EXPORTER_AUTO_DISCOVER_DATABASES
              value: "true"
          ports:
            - name: metrics
              containerPort: 9187
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 1
            failureThreshold: 6
          resources:
            {{- toYaml .Values.metrics.resources | nindent 12 }}
          {{- if .Values.auth.usePasswordFiles }}
          volumeMounts:
            - name: postgresql-passwords
              mountPath: /opt/postgresql/secrets
              readOnly: true
          {{- end }}
        {{- end }}
      volumes:
        {{- if or .Values.primary.configuration .Values.primary.pgHbaConfiguration }}
        - name: config
          configMap:
            name: {{ include "postgresql.primary.fullname" . }}-config
        {{- end }}
        - name: tmp
          emptyDir: {}
        - name: run
          emptyDir: {}
        {{- if $initdbCM }}
        - name: initdb
          configMap:
            name: {{ $initdbCM }}
            defaultMode: 0755
        {{- end }}
        {{- if .Values.auth.usePasswordFiles }}
        - name: postgresql-passwords
          projected:
            sources:
              - secret:
                  name: {{ include "postgresql.secretName" . }}
                  items:
                    {{- if .Values.auth.enablePostgresUser }}
                    - key: {{ .Values.auth.secretKeys.adminPasswordKey }}
                      path: {{ .Values.auth.secretKeys.adminPasswordKey }}
                    {{- end }}
                    {{- if .Values.auth.username }}
                    - key: {{ .Values.auth.secretKeys.userPasswordKey }}
                      path: {{ .Values.auth.secretKeys.userPasswordKey }}
                    {{- end }}
        {{- end }}
        {{- if not .Values.primary.persistence.enabled }}
        - name: data
          emptyDir: {}
        {{- else if .Values.primary.persistence.existingClaim }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Values.primary.persistence.existingClaim }}
        {{- end }}
        {{- with .Values.primary.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
  {{- if and .Values.primary.persistence.enabled (not .Values.primary.persistence.existingClaim) }}
  volumeClaimTemplates:
    - metadata:
        name: data
        {{- with .Values.primary.persistence.annotations }}
        annotations:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      spec:
        accessModes:
          {{- toYaml .Values.primary.persistence.accessModes | nindent 10 }}
        {{- include "postgresql.storageClass" . | nindent 8 }}
        resources:
          requests:
            storage: {{ .Values.primary.persistence.size | quote }}
  {{- end }}
