apiVersion: v2
name: postgresql
description: >
  PostgreSQL is an open source object-relational database known for reliability
  and data integrity. ACID-compliant, it supports foreign keys, joins, views,
  triggers and stored procedures.
type: application
version: 0.3.0
appVersion: "17.4.0"
home: https://www.postgresql.org
icon: https://wiki.postgresql.org/images/a/a4/PostgreSQL_logo.3colors.svg
keywords:
  - postgresql
  - postgres
  - database
  - sql
sources:
  - https://github.com/docker-library/postgres
maintainers:
  - name: Phil
    email: phil@kagiso.me
annotations:
  artifacthub.io/category: database
  artifacthub.io/license: Apache-2.0
  artifacthub.io/links: |
    - name: Documentation
      url: https://www.postgresql.org/docs/
    - name: Source
      url: https://github.com/phil-mcgee/charts/tree/main/charts/postgresql
  artifacthub.io/maintainers: |
    - name: Phil
      email: phil@kagiso.me
  artifacthub.io/images: |
    - name: postgresql
      image: docker.io/postgres:17.4-alpine
    - name: postgres-exporter
      image: docker.io/prometheuscommunity/postgres-exporter:v0.15.0
  artifacthub.io/changes: |
    - kind: added
      description: Initial release
    - kind: added
      description: "metrics: postgres_exporter sidecar, metrics Service, and Prometheus Operator ServiceMonitor"
    - kind: added
      description: "security: seccompProfile RuntimeDefault, readOnlyRootFilesystem enforced, auth.usePasswordFiles"
    - kind: added
      description: "operations: terminationGracePeriodSeconds, lifecycleHooks, persistentVolumeClaimRetentionPolicy, revisionHistoryLimit, minReadySeconds"
    - kind: added
      description: "scheduling: affinity presets (soft/hard), topologySpreadConstraints, priorityClassName, schedulerName"
    - kind: added
      description: "init: volumePermissions init container, initdb scripts support"
    - kind: added
      description: "override: primary.command and primary.args for full container command control"
    - kind: changed
      description: "BREAKING: readOnlyRootFilesystem now defaults to true; /var/run/postgresql emptyDir added for socket"
